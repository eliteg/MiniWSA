spring:
  application:
    name: mini-wsa
  jackson:
    deserialization:
      # Lets a single event object bind to List<Event> as a 1-element list, so the ingest
      # endpoint accepts both a single event and an array (spec §8.1).
      accept-single-value-as-array: true

server:
  port: 8080

# Threat-score policy. Weights/bonuses are fixed (on the enums / as constants); the cap is the
# one tunable knob — override per environment (e.g. k8s env var WSA_SCORING_CAP).
wsa:
  scoring:
    cap: 100
